packages:
  - apps/*
  - packages/*

# Two catalogs: `prod` for runtime libraries that ship with the app,
# `dev` for tooling (build, test, types). Reference as
# "react": "catalog:prod" / "typescript": "catalog:dev" in any package.json.
catalogs:
  dev:
    '@cloudflare/workers-types': ^4
    '@types/node': ^25
    '@types/react': ^19
    '@types/react-dom': ^19
    drizzle-kit: ^0.31.10
    tailwindcss: ^4
    tsdown: ^0.21.10
    typescript: ^6
    vitest: ^4.1.5
    wrangler: ^4.87.0
  prod:
    '@hono/zod-validator': ^0.7.6
    '@libsql/client': ^0.17.3
    drizzle-orm: ^0.45.2
    hono: ^4.12.16
    next: 16.2.4
    next-themes: ^0.4.6
    react: ^19
    react-dom: ^19
    winston: ^3.19.0
    winston-daily-rotate-file: ^5.0.0
    zod: ^4.4.3
    zustand: ^5.0.12
